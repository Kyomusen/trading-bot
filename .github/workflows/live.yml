name: Live Trading

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Symbol to trade (leave empty for all)'
        required: false
        type: string
      mode:
        description: 'Mode'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - backtest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
  CAPITAL_EMAIL: ${{ secrets.CAPITAL_EMAIL }}
  CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
  CAPITAL_DEMO: 'true'
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Run bot
        run: node core/runner.js ${{ github.event.inputs.mode || 'live' }} ${{ github.event.inputs.symbol || '' }}
