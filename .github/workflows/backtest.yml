name: Backtest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  backtest:
    strategy:
      matrix:
        symbol: [XAUUSD, USDJPY]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Run backtest
        run: node core/runner.js backtest ${{ matrix.symbol }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ matrix.symbol }}-${{ github.run_id }}
          path: backtests/
          retention-days: 7
