name: Backtest

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - id: set-matrix
        run: |
          SYMBOLS=$(node -e "
            const fs=require('fs');
            const dirs=fs.readdirSync('symbols').filter(d=>fs.statSync('symbols/'+d).isDirectory());
            console.log(JSON.stringify(dirs));
          ")
          echo "matrix={\"symbol\":$SYMBOLS}" >> $GITHUB_OUTPUT

  backtest:
    needs: setup
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Run backtest
        run: node core/runner.js backtest ${{ matrix.symbol }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ matrix.symbol }}-${{ github.run_id }}
          path: backtests/
          retention-days: 7
